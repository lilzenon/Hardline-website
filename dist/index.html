    <!--

        admin.b2b.click serves BOTH no-CORS images (<img src=...>) AND CORS API/fetch calls.
        Browsers keep separate sockets per CORS mode, so we declare both — the no-crossorigin
        variant warms the image socket (the first thing Lighthouse sees on LCP path).
    -->
    <link rel="preconnect" href="https://admin.b2b.click">
    <link rel="preconnect" href="https://admin.b2b.click" crossorigin>

    <!-- Google Analytics - Dynamic Loading from API (deferred off LCP critical path) -->
    <script>
        // dataLayer + gtag stub created synchronously so any early React calls
        // queue into it and replay once gtag.js arrives. Cheap, no network.
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        window.gtag = gtag;
        gtag('js', new Date());

        // Defer the /seo/fast fetch + gtag.js load until AFTER load + idle.
        // Was previously synchronous in HEAD which put /seo/fast on the LCP
        // critical chain (Lighthouse network-dependency-tree audit, ~667ms).
        (function () {
            var idle = window.requestIdleCallback || function (cb) { return setTimeout(cb, 1); };
            function loadGA() {
                fetch('/api/settings/seo/fast')
                    .then(function (res) { return res.json(); })
                    .then(function (data) {
                        var gaId = data.settings && data.settings.google_analytics_id;
                        if (gaId && gaId.trim()) {
                            var script = document.createElement('script');
                            script.async = true;
                            script.src = 'https://www.googletagmanager.com/gtag/js?id=' + gaId;
                            document.head.appendChild(script);
                            gtag('config', gaId, { send_page_view: true });
                        }
                    })
                    .catch(function (err) {
                        console.warn('Failed to load GA settings:', err);
                    });
            }
            if (document.readyState === 'complete') {
                idle(loadGA);
            } else {
                window.addEventListener('load', function () { idle(loadGA); }, { once: true });
            }
        })();
    </script>

    <!--
        YouTube preconnects fire on first user interaction (scroll / touch / pointer).
        Previous setTimeout-on-load approach added 4 preconnects unconditionally and
        tripped Lighthouse's "more than 4 preconnect connections" audit even when
        the user never reached the YouTube embed. With first-interaction-gating,
        bots/crawlers (which never scroll) skip the preconnects entirely while real
        users still get them well before the embed enters the viewport.

        NOTE: no `crossorigin` attribute — the YouTube iframe and i.ytimg / img.youtube
        thumbnail requests are no-CORS, so an `anonymous` preconnect would land in a
        different connection pool and stay unused (Lighthouse audit confirmed this).
        gstatic.com is loaded by the YouTube IFrame Player API (enablejsapi=1), so it stays.
        img.youtube.com hosts the autoplay-thumbnail (FigmaMobile.jsx), worth ~300ms per Lighthouse.
    -->
    <script>
        (function () {
            var fired = false;
            function fire() {
                if (fired) return;
                fired = true;
                ['https://www.youtube.com', 'https://i.ytimg.com', 'https://img.youtube.com', 'https://www.gstatic.com'].forEach(function (d) {
                    var l = document.createElement('link');
                    l.rel = 'preconnect';
                    l.href = d;
                    document.head.appendChild(l);
                });
                window.removeEventListener('scroll', fire);
                window.removeEventListener('pointerdown', fire);
                window.removeEventListener('touchstart', fire);
                window.removeEventListener('keydown', fire);
            }
            window.addEventListener('scroll', fire, { passive: true, once: true });
            window.addEventListener('pointerdown', fire, { passive: true, once: true });
            window.addEventListener('touchstart', fire, { passive: true, once: true });
            window.addEventListener('keydown', fire, { once: true });
        })();
    </script>
