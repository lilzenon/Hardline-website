    <title>BOUNCE2BOUNCE</title>

    <!-- Preload only critical font weight for optimal performance -->
    <link rel="preload" href="/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Defer YouTube preconnect until after LCP to reduce contention -->
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                ['https://www.youtube.com', 'https://i.ytimg.com', 'https://www.gstatic.com'].forEach((d) => {
                    const l = document.createElement('link');
                    l.rel = 'preconnect';
                    l.href = d;
                    l.crossOrigin = 'anonymous';
                    document.head.appendChild(l);
                });
            }, 400);
        });
    </script>

    <!-- Optimized local fonts for performance -->
    <link rel="stylesheet" href="/css/fonts-optimized.css" />
