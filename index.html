<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#000000" />
    <title>BOUNCE2BOUNCE</title>

    <!-- Preconnect to critical third-party origins for faster resource loading -->
    <link rel="preconnect" href="https://admin.b2b.click" crossorigin>
    <link rel="preconnect" href="https://embed.laylo.com" crossorigin>

    <!-- Preload LCP Image for immediate discovery -->
    <link rel="preload" href="/images/b2b-logo-updated.svg" as="image" fetchpriority="high">

    <!-- Preload critical fonts to avoid request chaining -->
    <link rel="preload" href="/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin fetchpriority="high">
    <link rel="preload" href="/fonts/inter-700.woff2" as="font" type="font/woff2" crossorigin fetchpriority="high">
    <link rel="preload" href="/fonts/inter-800.woff2" as="font" type="font/woff2" crossorigin fetchpriority="high">

    <!-- Google Analytics - Dynamic Loading from API -->
    <script>
        // 🚀 CRITICAL: Load Google Analytics immediately on page load
        // Fetches GA ID from dashboard and injects gtag.js before React hydrates
        (function () {
            // Initialize dataLayer first (before gtag.js loads)
            window.dataLayer = window.dataLayer || [];
            function gtag() { dataLayer.push(arguments); }
            window.gtag = gtag;
            gtag('js', new Date());

            // Fetch GA ID from settings API
            fetch('/api/settings/seo/fast')
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    var gaId = data.settings && data.settings.google_analytics_id;
                    if (gaId && gaId.trim()) {
                        console.log('📊 Google Analytics ID loaded:', gaId);

                        // Load gtag.js script
                        var script = document.createElement('script');
                        script.async = true;
                        script.src = 'https://www.googletagmanager.com/gtag/js?id=' + gaId;
                        document.head.appendChild(script);

                        // Configure GA4
                        gtag('config', gaId, { send_page_view: true });
                        console.log('✅ Google Analytics 4 initialized:', gaId);
                    }
                })
                .catch(function (err) {
                    console.warn('⚠️ Failed to load GA settings:', err);
                });
        })();
    </script>

    <!-- Defer YouTube preconnect until after LCP to reduce contention -->
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                ['https://www.youtube.com', 'https://i.ytimg.com', 'https://www.gstatic.com'].forEach((d) => {
                    const l = document.createElement('link');
                    l.rel = 'preconnect';
                    l.href = d;
                    l.crossOrigin = 'anonymous';
                    document.head.appendChild(l);
                });
            }, 400);
        });
    </script>

    <!-- Optimized local fonts for performance -->
    <!-- Optimized local fonts for performance (Inlined to prevent render blocking) -->
    <style>
        /**
 * Optimized Font Loading CSS - Performance Focused
 * Consolidated from fonts.css and font-optimization.css
 * Reduces initial font loading from 333KB to ~111KB
 */

        /* ===== INTER FONT DECLARATIONS ===== */

        /* Inter Regular (400) - Critical font preloaded */
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url('/fonts/inter-400.woff2') format('woff2');
            unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
        }

        /* Inter Bold (700) - Critical font preloaded */
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 700;
            font-display: swap;
            src: url('/fonts/inter-700.woff2') format('woff2');
            unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
        }

        /* Inter Extra Bold (800) - Critical font preloaded */
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 800;
            font-display: swap;
            src: url('/fonts/inter-800.woff2') format('woff2');
            unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
        }

        /* ===== FALLBACK FONTS WITH METRIC OVERRIDES ===== */

        @font-face {
            font-family: 'Inter-fallback';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: local('Arial'), local('Helvetica'), local('system-ui');
            ascent-override: 90.20%;
            descent-override: 22.48%;
            line-gap-override: 0.00%;
            size-adjust: 107.40%;
        }

        @font-face {
            font-family: 'Inter-fallback';
            font-style: normal;
            font-weight: 700;
            font-display: swap;
            src: local('Arial Bold'), local('Helvetica Bold'), local('system-ui');
            ascent-override: 90.20%;
            descent-override: 22.48%;
            line-gap-override: 0.00%;
            size-adjust: 107.40%;
        }

        @font-face {
            font-family: 'Inter-fallback';
            font-style: normal;
            font-weight: 800;
            font-display: swap;
            src: local('Arial Black'), local('Helvetica Bold'), local('system-ui');
            ascent-override: 90.20%;
            descent-override: 22.48%;
            line-gap-override: 0.00%;
            size-adjust: 107.40%;
        }

        /* ===== CSS CUSTOM PROPERTIES ===== */

        :root {
            --font-inter: 'Inter', 'Inter-fallback', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* ===== BASE FONT APPLICATION ===== */

        body,
        html {
            font-family: var(--font-inter);
            font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
            font-display: swap;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===== PERFORMANCE OPTIMIZED CLASSES ===== */

        .font-inter {
            font-family: var(--font-inter);
        }

        .font-inter-400 {
            font-family: var(--font-inter);
            font-weight: 400;
        }

        .font-inter-700 {
            font-family: var(--font-inter);
            font-weight: 700;
        }

        .font-inter-800 {
            font-family: var(--font-inter);
            font-weight: 800;
        }

        /* ===== CRITICAL TEXT ELEMENTS ===== */

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .text-critical,
        .hero-text,
        .nav-text {
            font-family: var(--font-inter);
            font-display: swap;
        }

        /* ===== RESPONSIVE FONT OPTIMIZATION ===== */

        @media (max-width: 768px) {

            body,
            html {
                text-rendering: optimizeSpeed;
            }
        }

        @media (min-width: 769px) {

            body,
            html {
                text-rendering: optimizeLegibility;
            }
        }

        /* ===== UTILITY CLASSES ===== */

        .body-font {
            font-family: var(--font-inter);
            font-weight: 400;
            font-size: 16px;
            line-height: 1.6;
        }

        .heading-font {
            font-family: var(--font-inter);
            font-weight: 700;
            line-height: 1.2;
        }

        .display-font {
            font-family: var(--font-inter);
            font-weight: 800;
            line-height: 1.1;
        }
    </style>

    <!-- Splash styles to avoid CLS -->
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: Inter, system-ui, Segoe UI, Roboto, sans-serif
        }

        #root {
            min-height: 100vh
        }
    </style>

    <!-- Tailwind CSS - Deferred loading to prevent render blocking -->
    <link rel="stylesheet" href="/css/tailwind.css" media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="/css/tailwind.css">
    </noscript>

</head>
