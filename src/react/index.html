    <!-- Deferred YouTube Optimization - Don't Block Critical Resources -->
    <script>
        // Defer YouTube connections until after LCP
        window.addEventListener('load', () => {
            setTimeout(() => {
                // Add YouTube DNS prefetch after page load
                const ytDomains = [
                    '//www.youtube.com',
                    '//i.ytimg.com',
                    '//www.gstatic.com',
                    '//jnn-pa.googleapis.com'
                ];

                ytDomains.forEach(domain => {
                    const link = document.createElement('link');
                    link.rel = 'dns-prefetch';
                    link.href = domain;
                    document.head.appendChild(link);
                });

                // Add preconnect for YouTube after DNS prefetch
                setTimeout(() => {
                    const preconnectDomains = [
                        'https://www.youtube.com',
                        'https://i.ytimg.com',
                        'https://www.gstatic.com'
                    ];

                    preconnectDomains.forEach(domain => {
                        const link = document.createElement('link');
                        link.rel = 'preconnect';
                        link.href = domain;
                        link.crossOrigin = 'anonymous';
                        document.head.appendChild(link);
                    });
                }, 100);
            }, 500); // Delay YouTube connections by 500ms after page load
        });
    </script>

        /* Critical CSS optimized for iOS Safari performance */

         :root {
            --font-inter: 'Inter', 'Inter Fallback', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --color-primary: #319DFF;
            --color-success: #0AFF4B;
            --color-bg: #000000;
            --color-text: #FFFFFF;
            /* iOS Safe Area CSS Custom Properties */
            --safe-area-inset-top: env(safe-area-inset-top, 0px);
            --safe-area-inset-right: env(safe-area-inset-right, 0px);
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
            --safe-area-inset-left: env(safe-area-inset-left, 0px);
        }

        * {
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            /* Ensure html extends to full viewport including safe areas */
            min-height: 100%;
            min-height: 100dvh;
        }

        body {
            font-family: var(--font-inter);
            margin: 0;
            padding: 0;
            background: var(--color-bg);
            color: var(--color-text);
            font-display: swap;
            line-height: 1.5;
            /* Ensure body fills viewport */
            min-height: 100vh;
            min-height: 100dvh;
        }

        #root {
            min-height: 100vh;
            min-height: 100dvh;
            /* iOS Safari dynamic viewport */
        }

        /* PWA Standalone Mode - Apply safe area padding when launched from home screen */
        @media (display-mode: standalone) {
            html, body {
                /* In standalone mode, content should respect safe areas */
                padding-top: env(safe-area-inset-top, 0px);
            }
            #root {
                /* Ensure root container accounts for safe areas */
                min-height: calc(100dvh - env(safe-area-inset-top, 0px));
            }
        }

        /* Prevent layout shift during loading */
        .loading-placeholder {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: var(--color-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--color-text);
            font-family: var(--font-inter);
            font-size: 18px;
        }
        /* Optimize image loading */

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }
        /* iOS Safari specific optimizations */

        @supports (-webkit-touch-callout: none) {
            body {
                -webkit-overflow-scrolling: touch;
            }
            /* Fix iOS Safari viewport issues */
            .hero-container {
                min-height: 100vh;
                min-height: -webkit-fill-available;
            }
        }
    </style>
